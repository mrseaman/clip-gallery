<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: -apple-system, sans-serif; padding: 16px; min-width: 320px; }
  label { display: block; margin-top: 12px; font-size: 13px; color: #555; }
  input { display: block; width: 100%; margin-top: 4px; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
  button { margin-top: 16px; padding: 6px 16px; background: #4285f4; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
  button:hover { background: #3367d6; }
  .status { margin-top: 8px; font-size: 12px; color: #0a0; }
</style>
</head>
<body>
  <label>Gallery API URL
    <input type="text" id="apiUrl" placeholder="https://your-server.com/image/upload">
  </label>
  <label>API Key
    <input type="password" id="apiKey" placeholder="Your API key">
  </label>
  <button id="save">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
