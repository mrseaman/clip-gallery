<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clip Gallery</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #eee; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.header { padding: 24px; text-align: center; border-bottom: 1px solid #333; }
.header h1 { font-size: 1.4rem; font-weight: 400; letter-spacing: 0.05em; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; padding: 16px; }
.grid a { display: block; aspect-ratio: 1; overflow: hidden; border-radius: 4px; cursor: pointer; background: #252525; }
.grid a img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.2s; }
.grid a:hover img { transform: scale(1.05); }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 100; justify-content: center; align-items: center; cursor: pointer; }
.overlay.active { display: flex; }
.overlay img { max-width: 92vw; max-height: 92vh; object-fit: contain; border-radius: 4px; }
.overlay .nav { position: fixed; top: 50%; transform: translateY(-50%); font-size: 2.5rem; color: #fff; background: none; border: none; cursor: pointer; padding: 16px; opacity: 0.6; }
.overlay .nav:hover { opacity: 1; }
.overlay .prev { left: 8px; }
.overlay .next { right: 8px; }
.overlay .close { position: fixed; top: 12px; right: 20px; font-size: 2rem; color: #fff; background: none; border: none; cursor: pointer; opacity: 0.6; }
.overlay .close:hover { opacity: 1; }
.overlay .filename { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 0.85rem; }
.loading { text-align: center; padding: 80px; color: #666; }
</style>
</head>
<body>
<div class="header"><h1>Clip Gallery</h1></div>
<div class="grid" id="grid"><div class="loading">Loading...</div></div>
<div class="overlay" id="overlay">
  <button class="close" id="close">&times;</button>
  <button class="nav prev" id="prev">&#8249;</button>
  <button class="nav next" id="next">&#8250;</button>
  <img id="lightbox-img" src="" alt="">
  <div class="filename" id="filename"></div>
</div>
<script>
(function() {
  var basePath = window.location.pathname.replace(/\/+$/, "");
  var images = [];
  var current = -1;

  fetch(basePath + "/files.json")
    .then(function(r) { return r.json(); })
    .then(function(files) {
      images = files;
      render();
    })
    .catch(function() {
      document.getElementById("grid").innerHTML = "<div class=\"loading\">Failed to load images.</div>";
    });

  function render() {
    var grid = document.getElementById("grid");
    if (!images.length) { grid.innerHTML = "<div class=\"loading\">No images found.</div>"; return; }
    grid.innerHTML = images.map(function(name, i) {
      return "<a data-i=\"" + i + "\"><img src=\"" + basePath + "/" + encodeURIComponent(name) + "\" loading=\"lazy\" alt=\"" + name + "\"></a>";
    }).join("");
    grid.addEventListener("click", function(e) {
      var a = e.target.closest("a[data-i]");
      if (a) open(parseInt(a.dataset.i));
    });
  }

  function open(i) {
    current = i;
    document.getElementById("lightbox-img").src = basePath + "/" + encodeURIComponent(images[i]);
    document.getElementById("filename").textContent = images[i];
    document.getElementById("overlay").classList.add("active");
  }

  function close() {
    document.getElementById("overlay").classList.remove("active");
    document.getElementById("lightbox-img").src = "";
    current = -1;
  }

  function nav(dir) {
    if (current < 0) return;
    current = (current + dir + images.length) % images.length;
    document.getElementById("lightbox-img").src = basePath + "/" + encodeURIComponent(images[current]);
    document.getElementById("filename").textContent = images[current];
  }

  document.getElementById("overlay").addEventListener("click", function(e) { if (e.target === this) close(); });
  document.getElementById("close").addEventListener("click", close);
  document.getElementById("prev").addEventListener("click", function(e) { e.stopPropagation(); nav(-1); });
  document.getElementById("next").addEventListener("click", function(e) { e.stopPropagation(); nav(1); });
  document.addEventListener("keydown", function(e) {
    if (current < 0) return;
    if (e.key === "Escape") close();
    if (e.key === "ArrowLeft") nav(-1);
    if (e.key === "ArrowRight") nav(1);
  });
})();
</script>
</body>
</html>
